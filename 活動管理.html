<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="活動管理">
<meta name="theme-color" content="#0F6E56">
<title>活動管理</title>
<style>
:root{
  --teal:#0F6E56;--teal-d:#085041;--teal-m:#1D9E75;--teal-l:#E1F5EE;--teal-ll:#F0FAF6;
  --amber:#854F0B;--amber-l:#FAEEDA;--amber-m:#BA7517;
  --red:#A32D2D;--red-l:#FCEBEB;
  --blue:#185FA5;--blue-l:#E6F1FB;
  --gray:#5F5E5A;--gray-l:#F1EFE8;
  --border:rgba(0,0,0,0.1);--bord2:rgba(0,0,0,0.06);
  --bg:#F5F4F1;--card:#FFFFFF;--text:#18180F;--t2:#5F5E5A;--t3:#9A9893;
  --rad:14px;--rad-s:8px;--rad-m:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,'PingFang TC','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;}
#app{max-width:720px;margin:0 auto;padding-bottom:80px;}
.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:14px 20px 10px;position:sticky;top:0;z-index:100;}
.hdr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.app-ttl{font-size:20px;font-weight:700;color:var(--teal);letter-spacing:-.3px;}
.app-sub{font-size:12px;color:var(--t3);margin-top:1px;}
.btn-add{background:var(--teal);color:#fff;border:none;padding:8px 18px;border-radius:20px;font-size:13px;cursor:pointer;font-weight:600;}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;padding:14px 20px;}
.sc{background:var(--card);border-radius:var(--rad-m);padding:10px 12px;border:1px solid var(--border);}
.sv{font-size:20px;font-weight:700;}
.sl{font-size:10px;color:var(--t2);margin-top:1px;line-height:1.3;}
.filt{display:flex;gap:7px;padding:0 20px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.filt::-webkit-scrollbar{display:none;}
.pill{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:12px;color:var(--t2);white-space:nowrap;flex-shrink:0;}
.pill.act{background:var(--teal);color:#fff;border-color:var(--teal);}
.evlist{padding:0 20px;display:flex;flex-direction:column;gap:10px;}
.empty{text-align:center;padding:48px 20px;color:var(--t3);font-size:13px;}
.ecard{background:var(--card);border-radius:var(--rad);border:1px solid var(--border);overflow:hidden;}
.ecard.cwarn{border-left:3px solid var(--amber-m);}
.ehead{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none;}
.ehead:active{background:var(--bg);}
.pr{position:relative;width:44px;height:44px;flex-shrink:0;}
.pr svg{width:44px;height:44px;transform:rotate(-90deg);}
.pn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
.emeta{flex:1;min-width:0;}
.en{font-weight:700;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.es{font-size:12px;color:var(--t2);margin-top:2px;}
.dl-chip{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px;margin-top:4px;margin-right:3px;}
.dl-ok{background:var(--teal-l);color:var(--teal);}
.dl-warn{background:var(--amber-l);color:var(--amber-m);}
.dl-over{background:var(--red-l);color:var(--red);}
.ebs{display:flex;flex-wrap:wrap;gap:4px;flex-shrink:0;max-width:115px;justify-content:flex-end;}
.badge{padding:2px 7px;border-radius:8px;font-size:10px;font-weight:600;white-space:nowrap;}
.bok{background:var(--teal-l);color:var(--teal);}
.bwarn{background:var(--amber-l);color:var(--amber-m);}
.binfo{background:var(--blue-l);color:var(--blue);}
.bgray{background:var(--gray-l);color:var(--gray);}
.chv{font-size:11px;color:var(--t3);flex-shrink:0;transition:transform .15s;margin-left:4px;}
.ecard.open .chv{transform:rotate(180deg);}
.edetail{border-top:1px solid var(--border);}
.etabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;}
.etabs::-webkit-scrollbar{display:none;}
.etab{padding:10px 14px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;color:var(--t2);white-space:nowrap;flex-shrink:0;background:none;border-top:none;border-left:none;border-right:none;}
.etab.act{color:var(--teal);border-bottom-color:var(--teal);font-weight:600;}
.tab-body{padding:16px;}
/* Info tab */
.info-banner{background:var(--teal);color:#fff;border-radius:var(--rad-m);padding:16px;margin-bottom:14px;}
.info-ev-name{font-size:15px;font-weight:700;margin-bottom:10px;line-height:1.3;}
.info-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px;}
.info-row:last-of-type{margin-bottom:0;}
.info-icon{width:18px;text-align:center;font-size:13px;}
.info-edit-btn{background:rgba(255,255,255,0.2);color:#fff;border:none;padding:7px 14px;border-radius:20px;font-size:12px;cursor:pointer;font-weight:600;margin-top:12px;width:100%;}
.info-edit-form{background:var(--bg);border-radius:var(--rad-m);padding:14px;margin-bottom:14px;border:1px solid var(--border);}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.icard{background:var(--bg);border-radius:var(--rad-s);padding:10px 12px;}
.icard-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.icard-val{font-size:22px;font-weight:700;}
.phys-row-cnt{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.pcnt{flex:1;min-width:70px;background:var(--bg);border-radius:var(--rad-s);padding:10px 12px;text-align:center;}
.pcnt-n{font-size:20px;font-weight:700;}
.pcnt-l{font-size:10px;color:var(--t2);margin-top:2px;}
/* Checklist */
.stit{font-size:11px;font-weight:700;color:var(--t2);letter-spacing:.06em;text-transform:uppercase;margin:16px 0 8px;display:flex;align-items:center;gap:8px;}
.stit:first-child{margin-top:0;}
.spg{font-size:10px;font-weight:400;text-transform:none;letter-spacing:0;color:var(--t3);}
.ci{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--bord2);}
.ci:last-child{border-bottom:none;}
.ci input[type=checkbox]{flex-shrink:0;width:18px;height:18px;cursor:pointer;accent-color:var(--teal);}
.cilbl{flex:1;font-size:13px;cursor:pointer;line-height:1.4;}
.ci.done .cilbl{color:var(--t3);text-decoration:line-through;}
.ctag{font-size:10px;padding:1px 7px;border-radius:6px;background:var(--amber-l);color:var(--amber-m);flex-shrink:0;font-weight:600;}
/* Physician tab */
.phys-stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;margin-bottom:12px;}
.pstat{background:var(--bg);border-radius:var(--rad-s);padding:8px 10px;text-align:center;}
.pstat-n{font-size:18px;font-weight:700;}
.pstat-l{font-size:10px;color:var(--t2);margin-top:1px;}
.rsvp-bar{background:var(--teal-ll);border:1px solid var(--teal-l);border-radius:var(--rad-s);padding:8px 12px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;font-size:12px;}
.rsvp-bar b{color:var(--teal);}
.pr-row{background:var(--bg);border-radius:var(--rad-s);padding:10px 12px;display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.av{width:34px;height:34px;border-radius:50%;background:var(--teal-l);color:var(--teal);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.pr-info{flex:1;min-width:0;}
.pr-name{font-size:13px;font-weight:600;}
.pr-sub{font-size:11px;color:var(--t2);margin-top:2px;}
.pr-dl{font-size:10px;color:var(--t3);margin-top:1px;}
.status-btn{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;cursor:pointer;border:none;white-space:nowrap;}
.pr-del{background:none;border:none;color:var(--t3);cursor:pointer;font-size:18px;padding:4px;line-height:1;}
.s-waiting{background:var(--gray-l);color:var(--gray);}
.s-invited{background:var(--blue-l);color:var(--blue);}
.s-confirmed{background:var(--teal-l);color:var(--teal);}
.s-declined{background:var(--red-l);color:var(--red);}
.dash-btn{width:100%;padding:10px;border:1px dashed var(--border);border-radius:var(--rad-s);background:none;cursor:pointer;color:var(--teal);font-size:13px;font-weight:600;}
/* Agenda tab */
.ag-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.ag-info{font-size:12px;color:var(--t2);}
.ag-item{background:var(--bg);border-radius:var(--rad-s);padding:10px 12px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;}
.ag-tc{flex-shrink:0;width:88px;}
.ag-time{font-size:13px;font-weight:700;color:var(--teal);}
.ag-dur{font-size:10px;color:var(--t3);margin-top:2px;}
.ag-body{flex:1;min-width:0;}
.ag-badge{display:inline-block;font-size:10px;font-weight:600;padding:1px 7px;border-radius:6px;margin-bottom:4px;}
.ag-topic{font-size:13px;font-weight:600;line-height:1.3;}
.ag-spk{font-size:11px;color:var(--t2);margin-top:3px;}
.ag-del{background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;padding:2px 4px;line-height:1;}
.type-開場{background:#E6F1FB;color:#185FA5;}
.type-演講{background:var(--teal-l);color:var(--teal);}
.type-討論{background:#FAEEDA;color:#854F0B;}
.type-QA{background:var(--gray-l);color:var(--gray);}
.type-休息{background:var(--gray-l);color:var(--t3);}
.type-閉幕{background:var(--teal-l);color:var(--teal);}
.type-其他{background:var(--gray-l);color:var(--gray);}
.btn-print{background:var(--blue-l);color:var(--blue);border:1px solid var(--blue-l);padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}
/* Forms */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.ff{display:flex;flex-direction:column;gap:3px;}
.ff label{font-size:11px;color:var(--t2);font-weight:500;}
.ff input,.ff select,.ff textarea{font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);width:100%;}
.ff input:focus,.ff select:focus{outline:none;border-color:var(--teal);}
.full{grid-column:1/-1;}
.form-acts{display:flex;gap:8px;justify-content:flex-end;}
.btn{padding:7px 16px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text);}
.btn-teal{background:var(--teal);color:#fff;border-color:var(--teal);}
.btn-sm{padding:5px 12px;font-size:12px;}
.add-form-box{background:var(--bg);border-radius:var(--rad-s);padding:12px;border:1px solid var(--border);margin-top:8px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:720px;max-height:88vh;overflow-y:auto;}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.modal-ttl{font-size:17px;font-weight:700;}
.modal-close{background:none;border:none;font-size:22px;color:var(--t3);cursor:pointer;padding:0 4px;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.modal-foot{display:flex;gap:10px;}
.btn-full{flex:1;padding:14px;border-radius:12px;font-size:15px;cursor:pointer;border:none;font-weight:600;}
.detfoot{display:flex;justify-content:space-between;align-items:center;padding-top:12px;margin-top:12px;border-top:1px solid var(--border);}
.detfoot-info{font-size:12px;color:var(--t2);}
.btn-danger{color:var(--red);background:none;border:1px solid var(--border);padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;}
@media(max-width:500px){
  .stats{grid-template-columns:repeat(2,1fr);}
  .modal-grid{grid-template-columns:1fr;}
  .ebs{max-width:90px;}
  .ag-tc{width:72px;}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
const TMPL=[
  {cat:'基本設定',items:[
    {id:'b1',label:'確認活動類型與主題',c:false},
    {id:'b2',label:'確認日期、時間、場地',c:false},
    {id:'b3',label:'確認預算 (含 Compliance 金額上限)',c:true},
  ]},
  {cat:'邀請醫師',items:[
    {id:'d1',label:'建立邀請名單',c:false},
    {id:'d2',label:'發出邀請函 / 邀請電話',c:false},
    {id:'d3',label:'確認出席回覆 (RSVP)',c:false},
    {id:'d4',label:'寄送 Agenda 與活動說明資料',c:false},
  ]},
  {cat:'講師安排',items:[
    {id:'s1',label:'確認講師姓名與資格',c:true},
    {id:'s2',label:'確認演講題目',c:false},
    {id:'s3',label:'收到簡報初稿',c:false},
    {id:'s4',label:'Compliance 審查簡報內容',c:true},
    {id:'s5',label:'確認講師費符合 FMV',c:true},
    {id:'s6',label:'簽署講師合約 / 同意書',c:true},
  ]},
  {cat:'主持人',items:[
    {id:'m1',label:'確認主持人',c:false},
    {id:'m2',label:'確認主持人費用符合 FMV',c:true},
    {id:'m3',label:'寄送主持流程與重點',c:false},
  ]},
  {cat:'餐飲安排',items:[
    {id:'c1',label:'確認餐飲方式 (餐廳 / 便當)',c:false},
    {id:'c2',label:'確認每人費用符合 Compliance 上限',c:true},
    {id:'c3',label:'完成訂餐 / 訂位',c:false},
    {id:'c4',label:'確認份數與特殊餐飲需求',c:false},
  ]},
  {cat:'VEM',items:[
    {id:'v1',label:'開啟 VEM 活動 (Open Event)',c:false},
    {id:'v2',label:'上傳邀請名單至 VEM',c:false},
    {id:'v3',label:'確認 VEM 簽到功能設定',c:false},
    {id:'v4',label:'活動當天確認 VEM 簽到',c:false},
    {id:'v5',label:'活動結束後關閉 VEM (Close Event)',c:true},
    {id:'v6',label:'確認出席名單已完整記錄',c:true},
  ]},
  {cat:'Work Order',items:[
    {id:'w1',label:'申請 Work Order',c:false},
    {id:'w2',label:'Work Order 核准確認',c:false},
    {id:'w3',label:'記錄 WO 編號備查',c:false},
  ]},
  {cat:'Compliance 後續',items:[
    {id:'cp1',label:'出席名單回傳 / 歸檔',c:true},
    {id:'cp2',label:'費用報銷單據整理',c:true},
    {id:'cp3',label:'活動紀錄 / 照片 / 議程存檔',c:true},
    {id:'cp4',label:'Transfer of Value (TOV) 記錄更新',c:true},
  ]},
];

const STATUSES=['待邀請','已邀請/待回覆','確認出席','婉拒'];
const SCLS={'待邀請':'s-waiting','已邀請/待回覆':'s-invited','確認出席':'s-confirmed','婉拒':'s-declined'};
const HOSPITALS=['亞東醫院','和信醫院','輔大醫院','土城長庚'];
const TYPES=['Advisory Board','Investigator Meeting','Satellite Symposium','CME/CPD 講座','Product Launch','Round Table'];
const AG_TYPES=['開場','演講','討論','Q&A','休息','閉幕','其他'];

function mkCL(){return TMPL.map(cat=>({cat:cat.cat,items:cat.items.map(i=>({...i,done:false}))}));}
function prog(ev){const a=ev.checklist.flatMap(c=>c.items),d=a.filter(i=>i.done).length;return{done:d,total:a.length,pct:Math.round(d/a.length*100)};}
function hasCA(ev){return ev.checklist.flatMap(c=>c.items).some(i=>i.c&&!i.done);}
function daysTo(s){if(!s)return null;const d=new Date(s),t=new Date();t.setHours(0,0,0,0);d.setHours(0,0,0,0);return Math.round((d-t)/86400000);}
function physStats(ev){const p=ev.physicians||[];return{total:p.length,confirmed:p.filter(x=>x.status==='確認出席').length,noResp:p.filter(x=>x.status==='已邀請/待回覆').length,declined:p.filter(x=>x.status==='婉拒').length,waiting:p.filter(x=>x.status==='待邀請').length};}
function agDur(t1,t2){if(!t1||!t2)return'';const[h1,m1]=t1.split(':').map(Number),[h2,m2]=t2.split(':').map(Number);const min=(h2*60+m2)-(h1*60+m1);return min>0?min+'分':'';}
function todayStr(){return new Date().toISOString().slice(0,10);}
function dlChip(days,lbl){if(days===null)return'';const cls=days<0?'dl-over':days<=3?'dl-warn':'dl-ok';const txt=days<0?`已過${-days}天`:days===0?'今天截止':`剩${days}天`;return`<span class="dl-chip ${cls}">${lbl}：${txt}</span>`;}

function mkSample(){
  const mk=(doneMap)=>{const cl=mkCL();Object.entries(doneMap).forEach(([cat,ids])=>{const c=cl.find(x=>x.cat===cat);if(c)ids.forEach(id=>{const i=c.items.find(x=>x.id===id);if(i)i.done=true;});});return cl;};
  return[
    {id:1,name:'亞東 Abemaciclib Advisory Board Q2',date:'2026-04-22',startTime:'14:00',endTime:'17:00',rsvpDeadline:'2026-04-16',hospital:'亞東醫院',type:'Advisory Board',venue:'教研大樓 3F 會議室',
      checklist:mk({'基本設定':['b1','b2','b3'],'邀請醫師':['d1','d2'],'講師安排':['s1','s2'],'VEM':['v1','v2','v3'],'Work Order':['w1','w2','w3']}),
      physicians:[
        {id:1,name:'張○○醫師',title:'主治醫師',dept:'血液腫瘤科',status:'確認出席',invitedDate:'2026-04-01',rsvpDl:'2026-04-16'},
        {id:2,name:'李○○醫師',title:'主治醫師',dept:'血液腫瘤科',status:'已邀請/待回覆',invitedDate:'2026-04-03',rsvpDl:'2026-04-16'},
        {id:3,name:'王○○醫師',title:'主治醫師',dept:'乳房外科',status:'婉拒',invitedDate:'2026-04-01',rsvpDl:'2026-04-16'},
        {id:4,name:'陳○○醫師',title:'主任',dept:'血液腫瘤科',status:'確認出席',invitedDate:'2026-04-02',rsvpDl:'2026-04-16'},
      ],
      agenda:[
        {id:1,startTime:'14:00',endTime:'14:10',type:'開場',topic:'開幕致詞與來賓介紹',speaker:'主持人'},
        {id:2,startTime:'14:10',endTime:'14:50',type:'演講',topic:'HR+/HER2- Advanced BC 治療策略更新',speaker:'張○○醫師'},
        {id:3,startTime:'14:50',endTime:'15:30',type:'演講',topic:'Abemaciclib 最新臨床證據與實務應用',speaker:'陳○○醫師'},
        {id:4,startTime:'15:30',endTime:'15:45',type:'休息',topic:'中場休息 / 茶點',speaker:''},
        {id:5,startTime:'15:45',endTime:'16:30',type:'討論',topic:'Case Discussion：臨床情境與用藥決策',speaker:'全體與會者'},
        {id:6,startTime:'16:30',endTime:'17:00',type:'Q&A',topic:'問答與綜合討論',speaker:'主持人'},
      ]
    },

function ring(pct){
  const r=17,circ=+(2*Math.PI*r).toFixed(2),off=+(circ*(1-pct/100)).toFixed(2);
  const col=pct===100?'#1D9E75':pct>60?'#185FA5':'#BA7517';
  const bg=pct===100?'#9FE1CB':pct>60?'#B5D4F4':'#FAC775';
  return`<div class="pr"><svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="${r}" fill="none" stroke="${bg}" stroke-width="3.5"/><circle cx="20" cy="20" r="${r}" fill="none" stroke="${col}" stroke-width="3.5" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round"/></svg><div class="pn" style="color:${col}">${pct}%</div></div>`;
}

function renderCard(ev){
  const p=prog(ev),isOpen=S.openId===ev.id,ca=hasCA(ev);

  const v5=ev.checklist.find(c=>c.cat==='VEM')?.items.find(i=>i.id==='v5')?.done;
  const w2=ev.checklist.find(c=>c.cat==='Work Order')?.items.find(i=>i.id==='w2')?.done;
  const ps=physStats(ev);
  const dEvent=daysTo(ev.date),dRsvp=daysTo(ev.rsvpDeadline);
  const timeStr=ev.startTime?(ev.startTime+(ev.endTime?' – '+ev.endTime:'')):'';
  const vb=v5?`<span class="badge bok">VEM 已關</span>`:v1?`<span class="badge binfo">VEM 開啟</span>`:`<span class="badge bgray">VEM 未開</span>`;
  const wb=w2?`<span class="badge bok">WO 核准</span>`:`<span class="badge bgray">WO 待核</span>`;

  const pb=ps.total>0?`<span class="badge ${ps.confirmed===ps.total&&ps.total>0?'bok':'bgray'}">${ps.confirmed}/${ps.total}出席</span>`:'';

  const ev=S.events.find(e=>e.id===eid);if(!ev)return;
  const ags=ev.agenda||[];
  const ps=physStats(ev);
  const confirmedNames=(ev.physicians||[]).filter(p=>p.status==='確認出席').map(p=>p.name).join('、');
  const invitedNames=(ev.physicians||[]).filter(p=>p.status==='已邀請/待回覆').map(p=>p.name).join('、');
  const rows=ags.map(ag=>{
    const dur=agDur(ag.startTime,ag.endTime);
    const typeColor={'開場':'#185FA5','演講':'#0F6E56','討論':'#854F0B','Q&A':'#5F5E5A','休息':'#9A9893','閉幕':'#0F6E56','其他':'#5F5E5A'}[ag.type]||'#333';
    return`<tr>
      <td nowrap>${ag.startTime||''}${ag.endTime?' – '+ag.endTime:''}</td>
      <td nowrap><span style="background:${typeColor}18;color:${typeColor};padding:1px 8px;border-radius:6px;font-size:11px;font-weight:600">${ag.type}</span></td>
      <td>${ag.topic}</td>
      <td>${ag.speaker||''}</td>
      <td nowrap style="color:#888;font-size:12px">${dur}</td>
    </tr>`;
  }).join('');
  const html=`<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><title>議程 — ${ev.name}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,'PingFang TC','Noto Sans TC',sans-serif;max-width:720px;margin:40px auto;padding:0 28px;color:#18180F;font-size:14px}
    .kicker{font-size:10px;color:#aaa;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
    h1{font-size:22px;font-weight:700;color:#0F6E56;margin-bottom:10px;line-height:1.3}
    .meta-row{display:flex;flex-wrap:wrap;gap:6px 20px;font-size:13px;color:#444;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #0F6E56}
    .meta-item{display:flex;align-items:center;gap:6px}
    .section{margin-bottom:20px}
    .sec-title{font-size:11px;font-weight:700;color:#0F6E56;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
    table{width:100%;border-collapse:collapse}
    th{background:#0F6E56;color:#fff;padding:8px 12px;text-align:left;font-size:12px;font-weight:600}
    td{padding:9px 12px;border-bottom:1px solid #eee;font-size:13px;vertical-align:middle}
    tr:nth-child(even) td{background:#f8faf8}
    .att-box{background:#F0FAF6;border:1px solid #9FE1CB;border-radius:8px;padding:12px 16px;margin-bottom:20px}
    .att-count{font-size:11px;font-weight:700;color:#0F6E56;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
    .att-names{font-size:13px;line-height:1.8;color:#333}
    .footer{font-size:11px;color:#bbb;margin-top:32px;border-top:1px solid #eee;padding-top:12px;display:flex;justify-content:space-between}
    @media print{@page{margin:20mm}body{margin:0}}
  </style></head><body>
  <div class="kicker">Abemaciclib 醫學活動 — 議程</div>
  <h1>${ev.name}</h1>
  <div class="meta-row">
    <div class="meta-item">📅 ${ev.date||'待定'}</div>
    <div class="meta-item">🕐 ${ev.startTime||''}${ev.endTime?' – '+ev.endTime:''}</div>
    <div class="meta-item">📍 ${ev.venue||'待定'}</div>
    <div class="meta-item">🏥 ${ev.hospital}</div>
    ${ev.rsvpDeadline?`<div class="meta-item">📋 RSVP 截止：${ev.rsvpDeadline}</div>`:''}
  </div>
  ${ps.total>0?`<div class="att-box">
    <div class="att-count">出席名單（${ps.total} 位受邀，${ps.confirmed} 位確認）</div>
    ${confirmedNames?`<div class="att-names"><b>確認出席：</b>${confirmedNames}</div>`:''}
    ${invitedNames?`<div class="att-names" style="color:#888"><b>待回覆：</b>${invitedNames}</div>`:''}
  </div>`:''}
  <div class="section">
    <div class="sec-title">活動議程</div>
    <table>
      <thead><tr><th>時間</th><th>類型</th><th>議程項目</th><th>講者 / 主持人</th><th>時長</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="5" style="text-align:center;color:#aaa;padding:20px">議程建立中</td></tr>'}</tbody>
    </table>
  </div>
  <div class="footer">
    <span>此議程如有調整，以現場公告為準。請準時出席，謝謝。</span>
    <span>製作日期：${new Date().toLocaleDateString('zh-TW')}</span>
  </div>
  <script>setTimeout(()=>window.print(),300)<\/script>
  </body></html>`;
  const w=window.open('','_blank','width=800,height=700');
  if(w){w.document.write(html);w.document.close();}
};

// Actions
window.sf=()=>{S.showForm=!S.showForm;render();}
window.closeFormIfBg=(e)=>{if(e.target.classList.contains('overlay'))sf();}
window.uf=(k,v)=>{S.form[k]=v;}
window.fil=(f)=>{S.filter=f;render();}
window.tog=(id)=>{S.openId=S.openId===id?null:id;if(!S.tab[id])S.tab[id]=0;render();}
window.setTab=(id,t)=>{S.tab[id]=t;render();}
window.tc=(eid,iid,checked)=>{const ev=S.events.find(e=>e.id===eid);if(!ev)return;ev.checklist.forEach(cat=>cat.items.forEach(i=>{if(i.id===iid)i.done=checked;}));save();render();}
window.addEv=()=>{
  if(!S.form.name.trim())return;
  const ev={id:++nid,...S.form,checklist:mkCL(),physicians:[],agenda:[]};
  S.events.unshift(ev);S.form={name:'',date:'',startTime:'',endTime:'',rsvpDeadline:'',hospital:'亞東醫院',type:'Advisory Board',venue:''};
  S.showForm=false;S.openId=ev.id;S.tab[ev.id]=0;save();render();
}
window.delEv=(id)=>{S.events=S.events.filter(e=>e.id!==id);if(S.openId===id)S.openId=null;save();render();}
window.uif=(eid,k,v)=>{const ev=S.events.find(e=>e.id===eid);if(ev)ev[k]=v;}
window.saveInfo=(eid)=>{S.showEditInfo[eid]=false;save();render();}
window.toggleAddPhys=(eid)=>{S.showAddPhys[eid]=!S.showAddPhys[eid];if(!S.physForm[eid])S.physForm[eid]={name:'',title:'主治醫師',dept:'',invitedDate:todayStr(),rsvpDl:'',status:'待邀請'};render();}
window.upf=(eid,k,v)=>{if(!S.physForm[eid])S.physForm[eid]={};S.physForm[eid][k]=v;}
window.addPhys=(eid)=>{
  const ev=S.events.find(e=>e.id===eid);const pf=S.physForm[eid]||{};
  if(!pf.name||!pf.name.trim())return;
  if(!ev.physicians)ev.physicians=[];
  ev.physicians.push({id:++npid,name:pf.name,title:pf.title||'主治醫師',dept:pf.dept||'',status:pf.status||'待邀請',invitedDate:pf.invitedDate||'',rsvpDl:pf.rsvpDl||''});
  S.showAddPhys[eid]=false;S.physForm[eid]={};save();render();
}
window.delPhys=(eid,pid)=>{const ev=S.events.find(e=>e.id===eid);if(ev)ev.physicians=(ev.physicians||[]).filter(p=>p.id!==pid);save();render();}
window.cycleStatus=(eid,pid)=>{
  const ev=S.events.find(e=>e.id===eid);if(!ev)return;
  const ph=(ev.physicians||[]).find(p=>p.id===pid);if(!ph)return;
  const idx=STATUSES.indexOf(ph.status);ph.status=STATUSES[(idx+1)%STATUSES.length];save();render();
}
window.toggleAddAg=(eid)=>{S.showAddAg[eid]=!S.showAddAg[eid];if(!S.agForm[eid])S.agForm[eid]={startTime:'',endTime:'',type:'演講',topic:'',speaker:''};render();}
window.uagf=(eid,k,v)=>{if(!S.agForm[eid])S.agForm[eid]={};S.agForm[eid][k]=v;}
window.addAg=(eid)=>{
  const ev=S.events.find(e=>e.id===eid);const af=S.agForm[eid]||{};
  if(!af.topic||!af.topic.trim())return;
  if(!ev.agenda)ev.agenda=[];
  ev.agenda.push({id:++nagid,startTime:af.startTime||'',endTime:af.endTime||'',type:af.type||'演講',topic:af.topic,speaker:af.speaker||''});
  S.showAddAg[eid]=false;S.agForm[eid]={};save();render();
}
window.delAg=(eid,aid)=>{const ev=S.events.find(e=>e.id===eid);if(ev)ev.agenda=(ev.agenda||[]).filter(a=>a.id!==aid);save();render();}

render();
</script>
</body>
</html>
