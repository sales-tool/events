<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="活動管理">
<meta name="theme-color" content="#0F6E56">
<title>活動管理</title>
<style>
:root{
  --teal:#0F6E56;--teal-d:#085041;--teal-m:#1D9E75;--teal-l:#E1F5EE;--teal-ll:#F0FAF6;
  --amber:#854F0B;--amber-l:#FAEEDA;--amber-m:#BA7517;
  --red:#A32D2D;--red-l:#FCEBEB;
  --blue:#185FA5;--blue-l:#E6F1FB;--blue-m:#378ADD;
  --purple:#3C3489;--purple-l:#EEEDFE;--purple-m:#7F77DD;
  --coral:#993C1D;--coral-l:#FAECE7;--coral-m:#D85A30;
  --gray:#5F5E5A;--gray-l:#F1EFE8;
  --border:rgba(0,0,0,0.1);--bord2:rgba(0,0,0,0.06);
  --bg:#F5F4F1;--card:#FFFFFF;--text:#18180F;--t2:#5F5E5A;--t3:#9A9893;
  --rad:14px;--rad-s:8px;--rad-m:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,'PingFang TC','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;}
#app{max-width:720px;margin:0 auto;padding-bottom:80px;}

/* ── Header ── */
.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:14px 20px 10px;position:sticky;top:0;z-index:100;}
.hdr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.app-ttl{font-size:20px;font-weight:700;color:var(--teal);letter-spacing:-.3px;}
.app-sub{font-size:12px;color:var(--t3);margin-top:1px;}
.btn-add{background:var(--teal);color:#fff;border:none;padding:8px 18px;border-radius:20px;font-size:13px;cursor:pointer;font-weight:600;}
.filt-wrap{display:flex;flex-direction:column;gap:5px;}
.filt{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
.filt::-webkit-scrollbar{display:none;}
.pill{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:12px;color:var(--t2);white-space:nowrap;flex-shrink:0;}
.pill.act{color:#fff;border-color:transparent;}
.pill-med.act{background:var(--teal);}
.pill-corp.act{background:var(--blue);}
.pill-collab.act{background:var(--purple);}
.pill-gs.act{background:var(--coral-m);}
.pill-all.act{background:var(--gray);}
.pill-hosp.act{background:var(--gray);color:#fff;}
.filt-lbl{font-size:10px;color:var(--t3);font-weight:600;letter-spacing:.04em;text-transform:uppercase;flex-shrink:0;align-self:center;}

/* ── Stats ── */
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;padding:14px 20px 10px;}
.sc{background:var(--card);border-radius:var(--rad-m);padding:10px 12px;border:1px solid var(--border);}
.sv{font-size:20px;font-weight:700;}
.sl{font-size:10px;color:var(--t2);margin-top:1px;line-height:1.3;}

/* ── Event list ── */
.evlist{padding:0 20px;display:flex;flex-direction:column;gap:10px;}
.empty{text-align:center;padding:48px 20px;color:var(--t3);font-size:13px;}

/* ── Event card ── */
.ecard{background:var(--card);border-radius:var(--rad);border:1px solid var(--border);overflow:hidden;}
.ecard.cwarn{border-left:3px solid var(--amber-m);}
.ecard-med{border-top:3px solid var(--teal);}
.ecard-corp{border-top:3px solid var(--blue-m);}
.ecard-collab{border-top:3px solid var(--purple-m);}
.ecard-gs{border-top:3px solid var(--coral-m);}
.ehead{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none;}
.ehead:active{background:var(--bg);}
.pr{position:relative;width:44px;height:44px;flex-shrink:0;}
.pr svg{width:44px;height:44px;transform:rotate(-90deg);}
.pn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
.emeta{flex:1;min-width:0;}
.en{font-weight:700;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.es{font-size:12px;color:var(--t2);margin-top:2px;}
.ecat-tag{display:inline-block;font-size:10px;font-weight:700;padding:1px 8px;border-radius:6px;margin-bottom:3px;}
.tag-med{background:var(--teal-l);color:var(--teal);}
.tag-corp{background:var(--blue-l);color:var(--blue);}
.tag-collab{background:var(--purple-l);color:var(--purple);}
.tag-gs{background:var(--coral-l);color:var(--coral);}
.dl-chip{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:7px;margin-top:3px;margin-right:3px;}
.dl-ok{background:var(--teal-l);color:var(--teal);}
.dl-warn{background:var(--amber-l);color:var(--amber-m);}
.dl-over{background:var(--red-l);color:var(--red);}
.ebs{display:flex;flex-wrap:wrap;gap:4px;flex-shrink:0;max-width:115px;justify-content:flex-end;}
.badge{padding:2px 7px;border-radius:8px;font-size:10px;font-weight:600;white-space:nowrap;}
.bok{background:var(--teal-l);color:var(--teal);}
.bwarn{background:var(--amber-l);color:var(--amber-m);}
.binfo{background:var(--blue-l);color:var(--blue);}
.bgray{background:var(--gray-l);color:var(--gray);}
.bpurple{background:var(--purple-l);color:var(--purple);}
.bcoral{background:var(--coral-l);color:var(--coral);}
.chv{font-size:11px;color:var(--t3);flex-shrink:0;transition:transform .15s;margin-left:4px;}
.ecard.open .chv{transform:rotate(180deg);}

/* ── Tabs ── */
.edetail{border-top:1px solid var(--border);}
.etabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;}
.etabs::-webkit-scrollbar{display:none;}
.etab{padding:10px 14px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;color:var(--t2);white-space:nowrap;flex-shrink:0;background:none;border-top:none;border-left:none;border-right:none;}
.etab.act{color:var(--teal);border-bottom-color:var(--teal);font-weight:600;}
.etab.act-blue{color:var(--blue);border-bottom-color:var(--blue);font-weight:600;}
.etab.act-purple{color:var(--purple);border-bottom-color:var(--purple);font-weight:600;}
.etab.act-coral{color:var(--coral-m);border-bottom-color:var(--coral-m);font-weight:600;}
.tab-body{padding:16px;}

/* ── Info banner ── */
.info-banner{border-radius:var(--rad-m);padding:16px;margin-bottom:14px;color:#fff;}
.bann-med{background:var(--teal);}
.bann-corp{background:var(--blue);}
.bann-collab{background:var(--purple);}
.bann-gs{background:var(--coral-m);}
.info-ev-name{font-size:15px;font-weight:700;margin-bottom:10px;line-height:1.3;}
.info-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;font-size:13px;}
.info-icon{width:18px;text-align:center;font-size:13px;flex-shrink:0;margin-top:1px;}
.info-edit-btn{background:rgba(255,255,255,0.2);color:#fff;border:none;padding:7px 14px;border-radius:20px;font-size:12px;cursor:pointer;font-weight:600;margin-top:12px;width:100%;}
.info-edit-form{background:var(--bg);border-radius:var(--rad-m);padding:14px;margin-bottom:14px;border:1px solid var(--border);}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.icard{background:var(--bg);border-radius:var(--rad-s);padding:10px 12px;}
.icard-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.icard-val{font-size:20px;font-weight:700;}
.phys-row-cnt{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.pcnt{flex:1;min-width:70px;background:var(--bg);border-radius:var(--rad-s);padding:10px 12px;text-align:center;}
.pcnt-n{font-size:20px;font-weight:700;}
.pcnt-l{font-size:10px;color:var(--t2);margin-top:2px;}

/* ── Checklist ── */
.stit{font-size:11px;font-weight:700;color:var(--t2);letter-spacing:.06em;text-transform:uppercase;margin:16px 0 8px;display:flex;align-items:center;gap:8px;}
.stit:first-child{margin-top:0;}
.spg{font-size:10px;font-weight:400;text-transform:none;letter-spacing:0;color:var(--t3);}
.ci{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--bord2);}
.ci:last-child{border-bottom:none;}
.ci input[type=checkbox]{flex-shrink:0;width:18px;height:18px;cursor:pointer;accent-color:var(--teal);}
.cilbl{flex:1;font-size:13px;cursor:pointer;line-height:1.4;}
.ci.done .cilbl{color:var(--t3);text-decoration:line-through;}
.ctag{font-size:10px;padding:1px 7px;border-radius:6px;background:var(--amber-l);color:var(--amber-m);flex-shrink:0;font-weight:600;}

/* ── Physicians / Targets ── */
.phys-stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;margin-bottom:12px;}
.pstat{background:var(--bg);border-radius:var(--rad-s);padding:8px 10px;text-align:center;}
.pstat-n{font-size:18px;font-weight:700;}
.pstat-l{font-size:10px;color:var(--t2);margin-top:1px;}
.rsvp-bar{background:var(--teal-ll);border:1px solid var(--teal-l);border-radius:var(--rad-s);padding:8px 12px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;font-size:12px;}
.rsvp-bar b{color:var(--teal);}
.pr-row{background:var(--bg);border-radius:var(--rad-s);padding:10px 12px;display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;background:var(--teal-l);color:var(--teal);}
.pr-info{flex:1;min-width:0;}
.pr-name{font-size:13px;font-weight:600;}
.pr-sub{font-size:11px;color:var(--t2);margin-top:2px;}
.pr-dl{font-size:10px;color:var(--t3);margin-top:1px;}
.status-btn{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;cursor:pointer;border:none;white-space:nowrap;}
.pr-del{background:none;border:none;color:var(--t3);cursor:pointer;font-size:18px;padding:4px;line-height:1;}
.s-waiting{background:var(--gray-l);color:var(--gray);}
.s-invited{background:var(--blue-l);color:var(--blue);}
.s-confirmed{background:var(--teal-l);color:var(--teal);}
.s-declined{background:var(--red-l);color:var(--red);}
/* GS statuses */
.s-visited{background:var(--blue-l);color:var(--blue);}
.s-interested{background:var(--teal-l);color:var(--teal);}
.s-prescribing{background:#EAF3DE;color:#3B6D11;}
.s-followup{background:var(--amber-l);color:var(--amber-m);}
.s-rejected{background:var(--red-l);color:var(--red);}

.dash-btn{width:100%;padding:10px;border:1px dashed var(--border);border-radius:var(--rad-s);background:none;cursor:pointer;color:var(--teal);font-size:13px;font-weight:600;}

/* ── Agenda ── */
.ag-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.ag-info{font-size:12px;color:var(--t2);}
.ag-item{background:var(--bg);border-radius:var(--rad-s);padding:10px 12px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;}
.ag-tc{flex-shrink:0;width:88px;}
.ag-time{font-size:13px;font-weight:700;color:var(--teal);line-height:1.4;}
.ag-dur{font-size:10px;color:var(--t3);margin-top:2px;}
.ag-body{flex:1;min-width:0;}
.ag-badge{display:inline-block;font-size:10px;font-weight:600;padding:1px 7px;border-radius:6px;margin-bottom:4px;}
.ag-topic{font-size:13px;font-weight:600;line-height:1.3;}
.ag-spk{font-size:11px;color:var(--t2);margin-top:3px;}
.ag-del{background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;padding:2px 4px;line-height:1;}
.type-開場{background:#E6F1FB;color:#185FA5;}
.type-演講{background:var(--teal-l);color:var(--teal);}
.type-討論{background:var(--amber-l);color:var(--amber-m);}
.type-QA{background:var(--gray-l);color:var(--gray);}
.type-休息{background:var(--gray-l);color:var(--t3);}
.type-閉幕{background:var(--teal-l);color:var(--teal);}
.type-其他{background:var(--gray-l);color:var(--gray);}

/* ── Notes tab ── */
.notes-area{width:100%;min-height:140px;padding:10px;font-size:13px;line-height:1.6;border:1px solid var(--border);border-radius:var(--rad-s);background:var(--bg);color:var(--text);resize:vertical;font-family:inherit;}
.notes-area:focus{outline:none;border-color:var(--teal);}
.notes-save{margin-top:8px;display:flex;justify-content:flex-end;}

/* ── Forms ── */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.ff{display:flex;flex-direction:column;gap:3px;}
.ff label{font-size:11px;color:var(--t2);font-weight:500;}
.ff input,.ff select,.ff textarea{font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);width:100%;}
.ff input:focus,.ff select:focus,.ff textarea:focus{outline:none;border-color:var(--teal);}
.full{grid-column:1/-1;}
.form-acts{display:flex;gap:8px;justify-content:flex-end;}
.btn{padding:7px 16px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text);}
.btn-teal{background:var(--teal);color:#fff;border-color:var(--teal);}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-print{background:var(--blue-l);color:var(--blue);border:1px solid var(--blue-l);padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}
.add-form-box{background:var(--bg);border-radius:var(--rad-s);padding:12px;border:1px solid var(--border);margin-top:8px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:720px;max-height:92vh;overflow-y:auto;}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.modal-ttl{font-size:17px;font-weight:700;}
.modal-close{background:none;border:none;font-size:22px;color:var(--t3);cursor:pointer;padding:0 4px;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.modal-foot{display:flex;gap:10px;}
.btn-full{flex:1;padding:14px;border-radius:12px;font-size:15px;cursor:pointer;border:none;font-weight:600;}
/* Category selector */
.cat-select{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px;}
.cat-opt{padding:10px 12px;border-radius:var(--rad-m);border:2px solid var(--border);cursor:pointer;text-align:center;user-select:none;}
.cat-opt .co-icon{font-size:22px;margin-bottom:4px;}
.cat-opt .co-name{font-size:13px;font-weight:600;}
.cat-opt .co-sub{font-size:10px;color:var(--t2);margin-top:1px;}
.cat-opt.sel-med{border-color:var(--teal);background:var(--teal-ll);}
.cat-opt.sel-corp{border-color:var(--blue-m);background:var(--blue-l);}
.cat-opt.sel-collab{border-color:var(--purple-m);background:var(--purple-l);}
.cat-opt.sel-gs{border-color:var(--coral-m);background:var(--coral-l);}
.detfoot{display:flex;justify-content:space-between;align-items:center;padding-top:12px;margin-top:12px;border-top:1px solid var(--border);}
.detfoot-info{font-size:12px;color:var(--t2);}
.btn-danger{color:var(--red);background:none;border:1px solid var(--border);padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;}
@media(max-width:500px){
  .stats{grid-template-columns:repeat(2,1fr);}
  .modal-grid{grid-template-columns:1fr;}
  .ebs{max-width:90px;}
  .ag-tc{width:72px;}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── Category definitions ──
const CATS={
  med:{key:'med',name:'自辦醫學活動',short:'醫學活動',tagCls:'tag-med',cardCls:'ecard-med',bannCls:'bann-med',accentColor:'#0F6E56'},
  corp:{key:'corp',name:'公司活動',short:'公司活動',tagCls:'tag-corp',cardCls:'ecard-corp',bannCls:'bann-corp',accentColor:'#185FA5'},
  collab:{key:'collab',name:'同事活動',short:'同事活動',tagCls:'tag-collab',cardCls:'ecard-collab',bannCls:'bann-collab',accentColor:'#3C3489'},
  gs:{key:'gs',name:'Group Selling',short:'Group Selling',tagCls:'tag-gs',cardCls:'ecard-gs',bannCls:'bann-gs',accentColor:'#D85A30'},
};

// ── Checklist templates per category ──
const TMPL_MED=[
  {cat:'基本設定',items:[
    {id:'b1',label:'確認活動類型與主題',c:false},
    {id:'b2',label:'確認日期、時間、場地',c:false},
    {id:'b3',label:'確認預算（含 Compliance 金額上限）',c:true},
  ]},
  {cat:'邀請醫師',items:[
    {id:'d1',label:'建立邀請名單',c:false},
    {id:'d2',label:'發出邀請函 / 電話邀請',c:false},
    {id:'d3',label:'確認出席回覆 (RSVP)',c:false},
    {id:'d4',label:'寄送 Agenda 與活動說明資料',c:false},
  ]},
  {cat:'講師安排',items:[
    {id:'s1',label:'確認講師姓名與資格',c:true},
    {id:'s2',label:'確認演講題目',c:false},
    {id:'s3',label:'收到簡報初稿',c:false},
    {id:'s4',label:'Compliance 審查簡報內容',c:true},
    {id:'s5',label:'確認講師費符合 FMV',c:true},
    {id:'s6',label:'簽署講師合約 / 同意書',c:true},
  ]},
  {cat:'主持人',items:[
    {id:'m1',label:'確認主持人',c:false},
    {id:'m2',label:'確認主持人費用符合 FMV',c:true},
    {id:'m3',label:'寄送主持流程與重點',c:false},
  ]},
  {cat:'餐飲安排',items:[
    {id:'c1',label:'確認餐飲方式（餐廳 / 便當）',c:false},
    {id:'c2',label:'確認每人費用符合 Compliance 上限',c:true},
    {id:'c3',label:'完成訂餐 / 訂位',c:false},
    {id:'c4',label:'確認份數與特殊飲食需求',c:false},
  ]},
  {cat:'VEM',items:[
    {id:'v1',label:'開啟 VEM 活動 (Open Event)',c:false},
    {id:'v2',label:'上傳邀請名單至 VEM',c:false},
    {id:'v3',label:'確認 VEM 簽到功能設定',c:false},
    {id:'v4',label:'活動當天確認 VEM 簽到',c:false},
    {id:'v5',label:'活動結束後關閉 VEM (Close Event)',c:true},
    {id:'v6',label:'確認出席名單已完整記錄',c:true},
  ]},
  {cat:'Work Order',items:[
    {id:'w1',label:'申請 Work Order',c:false},
    {id:'w2',label:'Work Order 核准確認',c:false},
    {id:'w3',label:'記錄 WO 編號備查',c:false},
  ]},
  {cat:'Compliance 後續',items:[
    {id:'cp1',label:'出席名單回傳 / 歸檔',c:true},
    {id:'cp2',label:'費用報銷單據整理',c:true},
    {id:'cp3',label:'活動紀錄 / 照片 / 議程存檔',c:true},
    {id:'cp4',label:'Transfer of Value (TOV) 記錄更新',c:true},
  ]},
];

const TMPL_CORP=[
  {cat:'活動確認',items:[
    {id:'ca1',label:'確認活動日期、時間、地點',c:false},
    {id:'ca2',label:'確認主辦部門與聯絡窗口',c:false},
    {id:'ca3',label:'確認自己的任務分工',c:false},
    {id:'ca4',label:'確認受邀醫師名單（自己負責的部分）',c:false},
  ]},

function getTmpl(cat){return{med:TMPL_MED,corp:TMPL_CORP,collab:TMPL_COLLAB,gs:TMPL_GS}[cat]||TMPL_MED;}
function mkCL(cat){return getTmpl(cat).map(c=>({cat:c.cat,items:c.items.map(i=>({...i,done:false}))}));}
function prog(ev){const a=ev.checklist.flatMap(c=>c.items),d=a.filter(i=>i.done).length;return{done:d,total:a.length,pct:a.length?Math.round(d/a.length*100):0};}
function hasCA(ev){return ev.checklist.flatMap(c=>c.items).some(i=>i.c&&!i.done);}
function daysTo(s){if(!s)return null;const d=new Date(s),t=new Date();t.setHours(0,0,0,0);d.setHours(0,0,0,0);return Math.round((d-t)/86400000);}
function todayStr(){return new Date().toISOString().slice(0,10);}
function dlChip(days,lbl){if(days===null)return'';const cls=days<0?'dl-over':days<=3?'dl-warn':'dl-ok';const txt=days<0?`已過${-days}天`:days===0?'今天截止':`剩${days}天`;return`<span class="dl-chip ${cls}">${lbl}：${txt}</span>`;}
function agDur(t1,t2){if(!t1||!t2)return'';const[h1,m1]=t1.split(':').map(Number),[h2,m2]=t2.split(':').map(Number);const min=(h2*60+m2)-(h1*60+m1);return min>0?min+'分':'';}

const GS_SCLS={'目標拜訪':'s-waiting','已拜訪':'s-visited','有處方意願':'s-interested','開始處方':'s-prescribing','需再追蹤':'s-followup','拒絕':'s-rejected'};

function getStatuses(ev){return ev.category==='gs'?GS_STATUSES:MED_STATUSES;}
function getScls(ev){return ev.category==='gs'?GS_SCLS:MED_SCLS;}

function physStats(ev){
  const p=ev.physicians||[];
  if(ev.category==='gs'){
    return{total:p.length,confirmed:p.filter(x=>x.status==='開始處方').length,noResp:p.filter(x=>x.status==='有處方意願').length,declined:p.filter(x=>x.status==='拒絕').length,waiting:p.filter(x=>x.status==='目標拜訪').length,visited:p.filter(x=>x.status==='已拜訪').length};
  }
  return{total:p.length,confirmed:p.filter(x=>x.status==='確認出席').length,noResp:p.filter(x=>x.status==='已邀請/待回覆').length,declined:p.filter(x=>x.status==='婉拒').length,waiting:p.filter(x=>x.status==='待邀請').length};
}

function ring(pct,color){
  const r=17,circ=+(2*Math.PI*r).toFixed(2),off=+(circ*(1-pct/100)).toFixed(2);
  const c={teal:'#1D9E75',blue:'#378ADD',purple:'#7F77DD',coral:'#D85A30'}[color]||'#1D9E75';
  const bg={teal:'#9FE1CB',blue:'#B5D4F4',purple:'#AFA9EC',coral:'#F0997B'}[color]||'#9FE1CB';
  const stroke=pct>0?c:'transparent';
  return`<div class="pr"><svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="${r}" fill="none" stroke="${bg}" stroke-width="3.5"/><circle cx="20" cy="20" r="${r}" fill="none" stroke="${stroke}" stroke-width="3.5" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round"/></svg><div class="pn" style="color:${c}">${pct}%</div></div>`;
}

  :`<div class="info-banner ${cat.bannCls}">

function renderChecklist(ev){
  const p=prog(ev);
  return ev.checklist.map(cat=>`
    <div class="stit">${cat.cat} <span class="spg">${cat.items.filter(i=>i.done).length}/${cat.items.length}</span></div>
    ${cat.items.map(item=>`<div class="ci ${item.done?'done':''}">
      <input type="checkbox" id="ck_${ev.id}_${item.id}" ${item.done?'checked':''} onchange="tc(${ev.id},'${item.id}',this.checked)">
      <label class="cilbl" for="ck_${ev.id}_${item.id}">${item.label}</label>
      ${item.c?'<span class="ctag">Compliance</span>':''}
    </div>`).join('')}
  `).join('')+`<div class="detfoot"><span class="detfoot-info">${p.done}/${p.total} 完成${p.pct===100?' · 全部完成 ✓':` · 待辦 ${p.total-p.done} 項`}</span><span></span></div>`;
}

function renderPhysicians(ev){
  const ps=physStats(ev),rsvpDays=daysTo(ev.rsvpDeadline);
  const isGs=ev.category==='gs';
  const statuses=getStatuses(ev),scls=getScls(ev);
  const statLabel=isGs?['開始處方','有意願','拒絕','目標']:['確認出席','待回覆','婉拒','待邀請'];
  const statsHtml=`<div class="phys-stats">
    <div class="pstat"><div class="pstat-n" style="color:var(--teal)">${ps.confirmed}</div><div class="pstat-l">${statLabel[0]}</div></div>
    <div class="pstat"><div class="pstat-n" style="color:var(--amber-m)">${ps.noResp}</div><div class="pstat-l">${statLabel[1]}</div></div>
    <div class="pstat"><div class="pstat-n" style="color:var(--red)">${ps.declined}</div><div class="pstat-l">${statLabel[2]}</div></div>
    <div class="pstat"><div class="pstat-n" style="color:var(--gray)">${ps.waiting}</div><div class="pstat-l">${statLabel[3]}</div></div>
  </div>`;
  const rsvpBlock=(!isGs&&ev.rsvpDeadline)?`<div class="rsvp-bar"><span>RSVP 截止：${ev.rsvpDeadline}</span><b>${rsvpDays!==null?(rsvpDays<0?`已過 ${-rsvpDays} 天`:rsvpDays===0?'今天截止':`還有 ${rsvpDays} 天`):''}</b></div>`:'';
  const rows=(ev.physicians||[]).map(ph=>{
    const sc=scls[ph.status]||'s-waiting';
    const initials=ph.name?ph.name.replace(/醫師|主任|教授/g,'').slice(-2):'?';
    return`<div class="pr-row">
      <div class="av ${sc}">${initials}</div>
      <div class="pr-info">
        <div class="pr-name">${ph.name}</div>
        <div class="pr-sub">${ph.title} · ${ph.dept||''}</div>
        ${ph.invitedDate?`<div class="pr-dl">${isGs?'加入日':'邀請日'}：${ph.invitedDate}</div>`:''}
        ${ph.rsvpDl?`<div class="pr-dl">RSVP：${ph.rsvpDl}</div>`:''}
        ${ph.notes?`<div class="pr-dl">${ph.notes}</div>`:''}
      </div>
      <button class="status-btn ${sc}" onclick="cycleStatus(${ev.id},${ph.id})">${ph.status}</button>
      <button class="pr-del" onclick="delPhys(${ev.id},${ph.id})">×</button>
    </div>`;
  }).join('');
  const showForm=S.showAddPhys[ev.id];
  const pf=S.physForm[ev.id]||{};
  const addLabel=isGs?'新增目標醫師':'新增邀請醫師';
  const notesField=isGs?`<div class="ff full"><label>備註（反應 / 問題）</label><input placeholder="例：對 OS data 有疑問" value="${pf.notes||''}" oninput="upf(${ev.id},'notes',this.value)"></div>`:'';
  const addForm=showForm?`<div class="add-form-box">
    <div class="fg">
      <div class="ff"><label>姓名</label><input placeholder="陳○○醫師" value="${pf.name||''}" oninput="upf(${ev.id},'name',this.value)"></div>
      <div class="ff"><label>職稱</label><input placeholder="主治醫師" value="${pf.title||'主治醫師'}" oninput="upf(${ev.id},'title',this.value)"></div>
      <div class="ff"><label>科別</label><input placeholder="血液腫瘤科" value="${pf.dept||''}" oninput="upf(${ev.id},'dept',this.value)"></div>
      ${!isGs?`<div class="ff"><label>邀請日期</label><input type="date" value="${pf.invitedDate||todayStr()}" oninput="upf(${ev.id},'invitedDate',this.value)"></div>
      <div class="ff"><label>RSVP 截止</label><input type="date" value="${pf.rsvpDl||ev.rsvpDeadline||''}" oninput="upf(${ev.id},'rsvpDl',this.value)"></div>`:''}
      <div class="ff"><label>狀態</label><select onchange="upf(${ev.id},'status',this.value)">${statuses.map(s=>`<option ${(pf.status||statuses[0])===s?'selected':''}>${s}</option>`).join('')}</select></div>
      ${notesField}
    </div>
    <div class="form-acts"><button class="btn btn-sm" onclick="toggleAddPhys(${ev.id})">取消</button><button class="btn btn-sm btn-teal" onclick="addPhys(${ev.id})">新增</button></div>
  </div>`:`<button class="dash-btn" onclick="toggleAddPhys(${ev.id})">＋ ${addLabel}</button>`;
  return`${statsHtml}${rsvpBlock}${!(ev.physicians||[]).length&&!showForm?'<div style="text-align:center;padding:20px;color:var(--t3);font-size:13px;">尚未新增</div>':''}${rows}${addForm}`;
}

function renderAgenda(ev){
  const ags=ev.agenda||[],showForm=S.showAddAg[ev.id],af=S.agForm[ev.id]||{};

      <div class="ag-body"><span class="ag-badge ${typeCls}">${ag.type}</span><div class="ag-topic">${ag.topic}</div>${ag.speaker?`<div class="ag-spk">${ag.speaker}</div>`:''}</div>
      <button class="ag-del" onclick="delAg(${ev.id},${ag.id})">×</button>
    </div>`;
  }).join('');
  const addForm=showForm?`<div class="add-form-box">
    <div class="fg">
      <div class="ff"><label>開始時間</label><input type="time" value="${af.startTime||''}" oninput="uagf(${ev.id},'startTime',this.value)"></div>

      <div class="ff"><label>類型</label><select onchange="uagf(${ev.id},'type',this.value)">${AG_TYPES.map(t=>`<option ${(af.type||'演講')===t?'selected':''}>${t}</option>`).join('')}</select></div>
      <div class="ff"><label>講者</label><input placeholder="姓名" value="${af.speaker||''}" oninput="uagf(${ev.id},'speaker',this.value)"></div>

  <div class="meta-row"><span>📅 ${ev.date||'待定'}</span><span>🕐 ${ev.startTime||''}${ev.endTime?' – '+ev.endTime:''}</span><span>📍 ${ev.venue||'待定'}</span><span>🏥 ${ev.hospital}</span>${ev.rsvpDeadline?`<span>📋 RSVP：${ev.rsvpDeadline}</span>`:''}</div>
  ${confirmedNames?`<div class="att-box"><div style="font-size:11px;font-weight:700;color:#0F6E56;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px">確認出席（${ps.confirmed}位）</div><div style="font-size:13px">${confirmedNames}</div></div>`:''}
  <table><thead><tr><th>時間</th><th>類型</th><th>議程項目</th><th>講者 / 主持人</th><th>時長</th></tr></thead><tbody>${rows||'<tr><td colspan="5" style="text-align:center;color:#aaa;padding:20px">議程建立中</td></tr>'}</tbody></table>
  <div class="footer"><span>此議程如有調整，以現場公告為準</span><span>製作：${new Date().toLocaleDateString('zh-TW')}</span></div>
  <script>setTimeout(()=>window.print(),300)<\/script></body></html>`;
  const w=window.open('','_blank','width=800,height=700');if(w){w.document.write(html);w.document.close();}
};

// ── Actions ──
window.sf=()=>{S.showForm=!S.showForm;render();}
window.closeFormIfBg=(e)=>{if(e.target.classList.contains('overlay'))sf();}
window.uf=(k,v)=>{S.form[k]=v;if(k==='category')render();} // re-render on cat change so form updates
window.filCat=(f)=>{S.filterCat=f;render();}
window.filHosp=(f)=>{S.filterHosp=f;render();}
window.tog=(id)=>{S.openId=S.openId===id?null:id;if(!S.tab[id])S.tab[id]=0;render();}
window.setTab=(id,t)=>{S.tab[id]=t;render();}
window.tc=(eid,iid,checked)=>{const ev=S.events.find(e=>e.id===eid);if(!ev)return;ev.checklist.forEach(cat=>cat.items.forEach(i=>{if(i.id===iid)i.done=checked;}));save();render();}
window.addEv=()=>{
  if(!S.form.name.trim())return;
  const ev={id:++nid,...S.form,checklist:mkCL(S.form.category),physicians:[],agenda:[],notes:''};
  S.events.unshift(ev);
  S.form={category:'med',name:'',date:'',startTime:'',endTime:'',rsvpDeadline:'',hospital:'亞東醫院',subType:'Advisory Board',venue:'',corpOrganizer:'',corpDept:'Marketing',yourRole:'',collabColleague:'',gsObjective:'',gsOutcome:'進行中',notes:''};
  S.showForm=false;S.openId=ev.id;S.tab[ev.id]=0;save();render();
}
window.delEv=(id)=>{S.events=S.events.filter(e=>e.id!==id);if(S.openId===id)S.openId=null;save();render();}
window.uif=(eid,k,v)=>{const ev=S.events.find(e=>e.id===eid);if(ev)ev[k]=v;}
window.saveInfo=(eid)=>{S.showEditInfo[eid]=false;save();render();}
window.saveNote=(eid,v)=>{const ev=S.events.find(e=>e.id===eid);if(ev){ev.notes=v;save();}}
window.toggleAddPhys=(eid)=>{const ev=S.events.find(e=>e.id===eid);S.showAddPhys[eid]=!S.showAddPhys[eid];const st=getStatuses(ev||{category:'med'});if(!S.physForm[eid])S.physForm[eid]={name:'',title:'主治醫師',dept:'',invitedDate:todayStr(),rsvpDl:'',status:st[0],notes:''};render();}
window.upf=(eid,k,v)=>{if(!S.physForm[eid])S.physForm[eid]={};S.physForm[eid][k]=v;}
window.addPhys=(eid)=>{
  const ev=S.events.find(e=>e.id===eid);const pf=S.physForm[eid]||{};
  if(!pf.name||!pf.name.trim())return;
  if(!ev.physicians)ev.physicians=[];
  const st=getStatuses(ev);
  ev.physicians.push({id:++npid,name:pf.name,title:pf.title||'主治醫師',dept:pf.dept||'',status:pf.status||st[0],invitedDate:pf.invitedDate||'',rsvpDl:pf.rsvpDl||'',notes:pf.notes||''});
  S.showAddPhys[eid]=false;S.physForm[eid]={};save();render();
}
window.delPhys=(eid,pid)=>{const ev=S.events.find(e=>e.id===eid);if(ev)ev.physicians=(ev.physicians||[]).filter(p=>p.id!==pid);save();render();}
window.cycleStatus=(eid,pid)=>{
  const ev=S.events.find(e=>e.id===eid);if(!ev)return;
  const ph=(ev.physicians||[]).find(p=>p.id===pid);if(!ph)return;
  const sts=getStatuses(ev);const idx=sts.indexOf(ph.status);ph.status=sts[(idx+1)%sts.length];save();render();
}
window.toggleAddAg=(eid)=>{S.showAddAg[eid]=!S.showAddAg[eid];if(!S.agForm[eid])S.agForm[eid]={startTime:'',endTime:'',type:'演講',topic:'',speaker:''};render();}
window.uagf=(eid,k,v)=>{if(!S.agForm[eid])S.agForm[eid]={};S.agForm[eid][k]=v;}
window.addAg=(eid)=>{
  const ev=S.events.find(e=>e.id===eid);const af=S.agForm[eid]||{};
  if(!af.topic||!af.topic.trim())return;
  if(!ev.agenda)ev.agenda=[];
  ev.agenda.push({id:++nagid,startTime:af.startTime||'',endTime:af.endTime||'',type:af.type||'演講',topic:af.topic,speaker:af.speaker||''});
  S.showAddAg[eid]=false;S.agForm[eid]={};save();render();
}
window.delAg=(eid,aid)=>{const ev=S.events.find(e=>e.id===eid);if(ev)ev.agenda=(ev.agenda||[]).filter(a=>a.id!==aid);save();render();}

render();
</script>
</body>
